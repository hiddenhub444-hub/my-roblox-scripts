<!DOCTYPE html>
<html>
<head>
    <title>Private Admin</title>
    <meta name="robots" content="noindex, nofollow">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0b1119; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .admin-box { background: #111926; padding: 30px; border-radius: 12px; border: 1px solid #007bff; display: inline-block; }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; background: #1c2636; color: white; border: 1px solid #333; }
        button { background: #007bff; color: white; border: none; padding: 15px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <script>
        var key = prompt("Enter Admin Key:");
        if (key !== "sufyan") { window.location.href = "https://www.google.com"; }
    </script>

    <div class="admin-box">
        <h2>Upload to Exploiters/roblox.com</h2>
        <input type="text" id="name" placeholder="Game Name">
        <input type="text" id="img" placeholder="Image URL">
        <textarea id="script" rows="5" placeholder="Paste Loadstring Here"></textarea>
        <button onclick="upload()">UPLOAD SCRIPT</button>
    </div>

    <script>
        // Paste your Firebase Config here (I can help you get this)
        const firebaseConfig = { apiKey: "...", databaseURL: "..." };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function upload() {
            const data = {
                name: document.getElementById('name').value,
                img: document.getElementById('img').value,
                script: document.getElementById('script').value
            };
            db.ref('scripts').push(data).then(() => alert("Uploaded! Refresh main site."));
        }
    </script>
</body>
</html>
