<!DOCTYPE html>
<html>
<head>
    <title>Private Script Management</title>
    <meta name="robots" content="noindex, nofollow">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: #0b1119; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { background: #111926; padding: 30px; border-radius: 12px; border: 1px solid #007bff; display: inline-block; width: 400px; }
        input, textarea { width: 90%; padding: 12px; margin: 10px 0; background: #1c2636; color: white; border: 1px solid #333; border-radius: 6px; }
        button { background: #007bff; color: white; border: none; padding: 15px; cursor: pointer; border-radius: 6px; font-weight: bold; width: 100%; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <script>
        // GATEKEEPER LOCK
        // Change "MySuperSecretKey444" to your own password
        var access = prompt("Enter Private Admin Key to view this page:");
        if (access !== "sufyan") {
            window.location.href = "https://www.google.com"; // Redirects intruders to Google
        }
    </script>

    <div class="box">
        <h2>Upload a New Script</h2>
        <input type="text" id="gameName" placeholder="Game Name">
        <input type="text" id="imageLink" placeholder="Image URL (e.g., from Imgur)">
        <textarea id="loadstring" rows="5" placeholder="Paste loadstring here"></textarea>
        <button onclick="uploadToDatabase()">UPLOAD TO MAIN SITE</button>
    </div>

    <script>
        // --- 30-Second Setup to get your Database Config ---
        // 1. Go to console.firebase.google.com
        // 2. Create a project, enable 'Realtime Database' (start in Test Mode).
        // 3. Paste your URL and API Key from your project settings below.

        const firebaseConfig = { 
            apiKey: "PASTE_YOUR_API_KEY_HERE",
            databaseURL: "PASTE_YOUR_REALTIME_DATABASE_URL_HERE" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function uploadToDatabase() {
            const data = {
                name: document.getElementById('gameName').value,
                img: document.getElementById('imageLink').value,
                script: document.getElementById('loadstring').value
            };
            // This line *actually saves* the data to your private database
            db.ref('scripts').push(data).then(() => {
                alert("Script successfully uploaded to your private database! Refresh your main site to see it.");
                document.getElementById('gameName').value = '';
                document.getElementById('imageLink').value = '';
                document.getElementById('loadstring').value = '';
            });
        }
    </script>
</body>
</html>
