<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0b1119; color: white; font-family: sans-serif; margin: 0; }
        .nav { display: flex; justify-content: space-between; padding: 20px; background: #111926; }
        .search-section { text-align: center; padding: 50px; }
        .search-bar { padding: 15px; width: 400px; border-radius: 8px; border: none; background: #1c2636; color: white; }
        .enter-btn { padding: 15px 25px; background: #007bff; border: none; color: white; border-radius: 8px; cursor: pointer; }
        
        /* This part makes it look like your screenshot */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: #1c2636; border-radius: 12px; overflow: hidden; position: relative; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-info { padding: 15px; }
        .badge { background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; position: absolute; top: 10px; left: 10px; font-size: 12px; }
        .key-system { background: #f1c40f; color: black; padding: 5px 10px; border-radius: 5px; display: inline-block; font-weight: bold; margin-bottom: 10px; }
        
        footer { position: fixed; bottom: 10px; width: 100%; text-align: center; }
        footer a { color: #555; text-decoration: none; }
    </style>
</head>
<body>
    <div class="nav">
        <div style="font-weight:bold; color:#007bff;">Exploiters/roblox.com</div>
        <button style="background:#4285F4; border:none; color:white; padding:10px; border-radius:5px;">Login with Google</button>
    </div>

    <div class="search-section">
        <h1>Search Results</h1>
        <input type="text" class="search-bar" placeholder="Search for a game...">
        <button class="enter-btn">Enter</button>
    </div>

    <div class="results-grid">
        <div class="card">
            <span class="badge">👁 908</span>
            <img src="https://via.placeholder.com/300x180" alt="game image">
            <div class="card-info">
                <div class="key-system">Key System</div>
                <h3>OP Auto Survive All Waves</h3>
                <p style="color:#888;">Defend your base from 67</p>
            </div>
        </div>
    </div>

    <footer>
        <a href="tos.html">Terms of Service</a>
    </footer>
</body>
</html>
