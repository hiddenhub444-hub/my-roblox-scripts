<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exploiters/Roblox.com</title>
    <style>
        body { background-color: #0b1119; color: white; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        .navbar { display: flex; justify-content: space-between; padding: 15px 30px; background: #111926; align-items: center; }
        .logo { color: #007bff; font-weight: bold; font-size: 20px; }
        .login-btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        
        .search-area { padding: 60px 20px; }
        input { padding: 15px; width: 400px; border-radius: 8px 0 0 8px; border: none; background: #1c2636; color: white; outline: none; }
        .enter-btn { padding: 15px 25px; background: #007bff; border: none; color: white; border-radius: 0 8px 8px 0; cursor: pointer; }

        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: #1c2636; border-radius: 12px; overflow: hidden; text-align: left; border: 1px solid #2d3748; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-info { padding: 15px; }
        .key-badge { background: #f1c40f; color: black; padding: 4px 8px; border-radius: 5px; font-weight: bold; font-size: 12px; margin-bottom: 10px; display: inline-block; }
        
        footer { padding: 20px; margin-top: 50px; }
        footer a { color: #555; text-decoration: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">Exploiters/roblox.com</div>
        <button class="login-btn" onclick="alert('Google Login is coming soon!')">Login with Google</button>
    </div>

    <div class="search-area">
        <h1>Search Results</h1>
        <input type="text" id="gameSearch" placeholder="Search (e.g. 67)...">
        <button class="enter-btn" onclick="runSearch()">Enter</button>
    </div>

    <div class="results-grid" id="grid">
        <div class="card" data-name="67 survive waves undetected">
            <img src="https://via.placeholder.com/300x180/007bff/fff?text=Survive+67" alt="game">
            <div class="card-info">
                <div class="key-badge">Key System</div>
                <p style="color:#007bff; margin:0;">Defend your base from 67</p>
                <h3>OP Auto Survive All Waves</h3>
            </div>
        </div>

        <div class="card" data-name="67 simulator admin abuse">
            <img src="https://via.placeholder.com/300x180/ff4757/fff?text=67+Simulator" alt="game">
            <div class="card-info">
                <div class="key-badge">Key System</div>
                <p style="color:#007bff; margin:0;">[ADMIN ABUSE] 67 Simulator</p>
                <h3>Best script</h3>
            </div>
        </div>
    </div>

    <footer>
        <a href="tos.html">Terms of Service</a>
    </footer>

    <script>
        function runSearch() {
            let filter = document.getElementById('gameSearch').value.toLowerCase();
            let cards = document.querySelectorAll('.card');
            
            cards.forEach(card => {
                let name = card.getAttribute('data-name');
                if (name.includes(filter)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
