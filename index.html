<script>
    // Make the Login button work
    document.querySelector('.login-btn').onclick = function() {
        alert("Google Login is being connected! For now, you are logged in as Admin.");
    };

    // Make the Enter button work for search
    document.querySelector('.enter-btn').onclick = function() {
        let searchTerm = document.querySelector('input').value.toLowerCase();
        let cards = document.querySelectorAll('.card');
        
        cards.forEach(card => {
            let title = card.querySelector('h3').innerText.toLowerCase();
            if(title.includes(searchTerm)) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }
        });
    };
</script>
