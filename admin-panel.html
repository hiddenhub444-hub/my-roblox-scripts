<!DOCTYPE html>
<html>
<head>
    <title>Hidden Admin Panel</title>
    <style>
        body { background: #0b1119; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { background: #111926; padding: 30px; border-radius: 15px; display: inline-block; border: 1px solid #007bff; }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; background: #1c2636; color: white; border: 1px solid #333; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="login-screen" class="box">
        <h2>Enter Admin Password</h2>
        <input type="password" id="pass" placeholder="Password">
        <button onclick="checkPass()">Unlock Panel</button>
    </div>

    <div id="upload-screen" class="box" style="display:none;">
        <h2>Upload New Script</h2>
        <input type="text" id="gameName" placeholder="Game Name">
        <input type="text" id="imageLink" placeholder="Image URL">
        <textarea id="loadstring" rows="5" placeholder="Paste loadstring here"></textarea>
        <button onclick="saveScript()">UPLOAD TO MAIN SITE</button>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('pass').value === "sufyan") {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('upload-screen').style.display = "block";
            } else { alert("Wrong Password!"); }
        }
        function saveScript() {
            alert("Script info captured! Note: GitHub Pages is 'Read Only', so to make this permanent, you'll need to copy the generated code into your index.html manually.");
            console.log("Game:", document.getElementById('gameName').value);
            console.log("Image:", document.getElementById('imageLink').value);
            console.log("Script:", document.getElementById('loadstring').value);
        }
    </script>
</body>
</html>
